<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bagua · Gravitational Network</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;cursor:grab}
body:active{cursor:grabbing}
canvas{display:block}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#title{position:absolute;top:20px;left:24px;color:#00ff80;font-size:14px;letter-spacing:3px}
#title span{color:#3a5a4a;font-size:10px;display:block;margin-top:4px;letter-spacing:1px}
#legend{position:absolute;bottom:20px;left:24px;display:flex;gap:14px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:#5a7a6a}
.leg .dot{width:7px;height:7px;border-radius:50%}
#hint{position:absolute;bottom:20px;right:24px;color:#3a5a4a;font-size:10px;text-align:right}
</style>
</head>
<body>
<div id="overlay">
  <div id="title">GRAVITATIONAL CLUSTER · BAGUA<span>v7 Density Field · 11 Clusters · 31 Edges · Data-driven</span></div>
  <div id="legend"></div>
  <div id="hint">Drag rotate · Scroll zoom · Right-drag pan</div>
</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.157.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.157.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';
import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';
import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';
import {CSS2DRenderer,CSS2DObject} from 'three/addons/renderers/CSS2DRenderer.js';

const g = {"nodes": [{"id": "太极", "x": 0, "y": 0, "z": 1, "size": 3.5, "color": "#ffffff", "mass": 11.8091}, {"id": "阴", "x": -3.5, "y": 1.5, "z": -3, "size": 3.2, "color": "#0066ff", "mass": 11.8081}, {"id": "阳", "x": 3.5, "y": -1.5, "z": 3, "size": 2.0, "color": "#ff6600", "mass": 3.7507}, {"id": "乾", "x": -6.4, "y": -6.4, "z": 2.5, "size": 1.6, "color": "#ff4444", "mass": 2.51}, {"id": "兑", "x": 0.0, "y": -9.0, "z": -3.5, "size": 1.6, "color": "#ff8844", "mass": 1.037}, {"id": "离", "x": 6.4, "y": -6.4, "z": -3.5, "size": 1.6, "color": "#ffcc00", "mass": 1.037}, {"id": "震", "x": 9.0, "y": 0.0, "z": -3.5, "size": 1.6, "color": "#44ff44", "mass": 1.037}, {"id": "巽", "x": 6.4, "y": 6.4, "z": -3.5, "size": 1.6, "color": "#00cc88", "mass": 1.0369}, {"id": "坎", "x": 0.0, "y": 9.0, "z": 2.5, "size": 1.6, "color": "#0044ff", "mass": 1.0368}, {"id": "艮", "x": -6.4, "y": 6.4, "z": 2.5, "size": 1.6, "color": "#8844ff", "mass": 1.0368}, {"id": "坤", "x": -9.0, "y": 0.0, "z": 2.5, "size": 1.6, "color": "#ff44ff", "mass": 1.0368}], "edges": [{"from": "太极", "to": "阴", "strength": 0.787}, {"from": "太极", "to": "阳", "strength": 1.0}, {"from": "太极", "to": "乾", "strength": 0.01}, {"from": "太极", "to": "兑", "strength": 0.062}, {"from": "太极", "to": "离", "strength": 0.062}, {"from": "太极", "to": "震", "strength": 0.062}, {"from": "太极", "to": "巽", "strength": 0.062}, {"from": "太极", "to": "坎", "strength": 0.424}, {"from": "太极", "to": "艮", "strength": 0.424}, {"from": "太极", "to": "坤", "strength": 0.424}, {"from": "阴", "to": "阳", "strength": 1.0}, {"from": "阴", "to": "兑", "strength": 0.425}, {"from": "阴", "to": "离", "strength": 0.425}, {"from": "阴", "to": "震", "strength": 0.425}, {"from": "阴", "to": "巽", "strength": 0.425}, {"from": "阴", "to": "坎", "strength": 0.063}, {"from": "阴", "to": "艮", "strength": 0.063}, {"from": "阴", "to": "坤", "strength": 0.063}, {"from": "阳", "to": "兑", "strength": 0.056}, {"from": "阳", "to": "离", "strength": 0.056}, {"from": "阳", "to": "震", "strength": 0.056}, {"from": "阳", "to": "巽", "strength": 0.056}, {"from": "阳", "to": "坎", "strength": 0.057}, {"from": "阳", "to": "艮", "strength": 0.057}, {"from": "阳", "to": "坤", "strength": 0.057}, {"from": "兑", "to": "离", "strength": 0.019}, {"from": "兑", "to": "巽", "strength": 0.019}, {"from": "离", "to": "震", "strength": 0.019}, {"from": "震", "to": "巽", "strength": 0.019}, {"from": "坎", "to": "艮", "strength": 0.019}, {"from": "坎", "to": "坤", "strength": 0.019}]};

// Scene
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.5,200);
camera.position.set(0, 8, 24);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(innerWidth,innerHeight);
labelRenderer.domElement.style.position = 'fixed';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

// Bloom
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.8,0.3,0.05));

// Controls
const controls = new OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 5;
controls.maxDistance = 50;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.35;
controls.target.set(0,0,0);

// Stars
const sg = new THREE.BufferGeometry();
const sp = new Float32Array(4000*3);
for(let i=0;i<4000*3;i++) sp[i]=(Math.random()-0.5)*80;
sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0x334466,size:0.05,blending:THREE.AdditiveBlending,depthWrite:false})));

// Rings
function ring(r,c,o,z){
  const g = new THREE.TorusGeometry(r,0.03,16,120);
  const m = new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:o,blending:THREE.AdditiveBlending,depthWrite:false});
  const mesh = new THREE.Mesh(g,m);
  mesh.rotation.x = Math.PI/2;
  mesh.position.z = z;
  return mesh;
}
scene.add(ring(9.5,'#00ff80',0.12,0));
scene.add(ring(10,'#00ff80',0.06,0));
scene.add(ring(5.5,'#ff6600',0.08,-2));
scene.add(ring(5.8,'#0066ff',0.08,2));

// Build nodes
const nodeMap = {};
g.nodes.forEach((n,i) => {
  const geom = new THREE.SphereGeometry(n.size*0.35,48,48);
  const mat = new THREE.MeshStandardMaterial({
    color:n.color,emissive:n.color,emissiveIntensity:0.7,
    roughness:0.25,metalness:0.15
  });
  const mesh = new THREE.Mesh(geom,mat);
  mesh.position.set(n.x,n.y,n.z);
  mesh.userData = n;
  scene.add(mesh);
  
  // Glow shell
  const glowG = new THREE.SphereGeometry(n.size*0.5,32,32);
  const glowM = new THREE.MeshBasicMaterial({color:n.color,transparent:true,opacity:0.12,blending:THREE.AdditiveBlending,depthWrite:false});
  const glow = new THREE.Mesh(glowG,glowM);
  mesh.add(glow);
  
  // Label
  const div = document.createElement('div');
  div.textContent = n.id;
  div.style.cssText = `color:${n.color};font-size:11px;font-weight:600;letter-spacing:1px;text-shadow:0 0 10px ${n.color}`;
  const label = new CSS2DObject(div);
  label.position.set(0,n.size*0.7,0);
  mesh.add(label);
  
  nodeMap[n.id] = mesh;
});

// Edges
g.edges.forEach(e => {
  const a = nodeMap[e.from], b = nodeMap[e.to];
  if(!a||!b) return;
  const p0 = a.position.clone(), p1 = b.position.clone();
  const mid = new THREE.Vector3().addVectors(p0,p1).multiplyScalar(0.5);
  const dist = p0.distanceTo(p1);
  mid.z += dist * 0.2;
  
  const curve = new THREE.QuadraticBezierCurve3(p0,mid,p1);
  const pts = curve.getPoints(50);
  const edgeGeom = new THREE.BufferGeometry().setFromPoints(pts);
  
  const cA = new THREE.Color(a.userData.color);
  const cB = new THREE.Color(b.userData.color);
  const cM = cA.clone().lerp(cB,0.5);
  
  const edgeMat = new THREE.LineBasicMaterial({
    color:cM,
    transparent:true,
    opacity:0.15 + e.strength*0.6,
    blending:THREE.AdditiveBlending,
    depthWrite:false,
    linewidth:1
  });
  
  const line = new THREE.Line(edgeGeom,edgeMat);
  scene.add(line);
  
  // Thicker glow line for strong edges
  if(e.strength > 0.3){
    const glowMat = new THREE.LineBasicMaterial({
      color:cM,transparent:true,opacity:0.08+e.strength*0.3,
      blending:THREE.AdditiveBlending,depthWrite:false,linewidth:1
    });
    const glowLine = new THREE.Line(edgeGeom,glowMat);
    glowLine.scale.set(1.02,1.02,1.02);
    scene.add(glowLine);
  }
});

// Lighting
scene.add(new THREE.AmbientLight(0x111133,0.5));

// Legend
const leg = document.getElementById('legend');
g.nodes.forEach(n => {
  const d = document.createElement('div');
  d.className = 'leg';
  d.innerHTML = `<div class="dot" style="background:${n.color};box-shadow:0 0 6px ${n.color}"></div>${n.id}`;
  leg.appendChild(d);
});

// Animate
let t = 0;
function animate(){
  requestAnimationFrame(animate);
  t += 0.005;
  controls.update();
  // Node breathing
  Object.values(nodeMap).forEach((m,i) => {
    m.scale.setScalar(1 + Math.sin(t*2.5 + i*0.7)*0.04);
  });
  composer.render();
  labelRenderer.render(scene,camera);
}
animate();

addEventListener('resize',()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
  labelRenderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
