  positions[i*3+1] = p[1];
  positions[i*3+2] = p[2];
  const v = p[3];
  let c;
  if (v < 0.25) c = cLow.clone().lerp(cMid, v/0.25);
  else if (v < 0.6) c = cMid.clone().lerp(cHigh, (v-0.25)/0.35);
  else if (v < 0.9) c = cHigh.clone().lerp(cPeak, (v-0.6)/0.3);
  else c = cPeak;
  colors[i*3] = c.r;
  colors[i*3+1] = c.g;
  colors[i*3+2] = c.b;
}

const geom = new THREE.BufferGeometry();
geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const mat = new THREE.PointsMaterial({
  size: 0.65,
  vertexColors: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  transparent: true,
  opacity: 0.95
});

const cloud = new THREE.Points(geom, mat);
scene.add(cloud);

// Grid
const grid = new THREE.PolarGridHelper(24, 32, 24, 64, 0x003322, 0x001a11);
scene.add(grid);

// Stars
const starsG = new THREE.BufferGeometry();
const sc = 2000;
const sp = new Float32Array(sc*3);
for (let i = 0; i < sc*3; i++) sp[i] = (Math.random()-0.5)*120;
starsG.setAttribute('position', new THREE.BufferAttribute(sp, 3));
scene.add(new THREE.Points(starsG, new THREE.PointsMaterial({ color:0x334455, size:0.08, blending:THREE.AdditiveBlending, depthWrite:false })));

const chart = echarts.init(document.getElementById('chart-panel'));
chart.setOption({
  backgroundColor:'transparent',
  grid:{ left:50, right:15, top:8, bottom:15 },
  xAxis:{ type:'value', name:'步数', nameTextStyle:{color:'#3a5a4a'}, axisLine:{lineStyle:{color:'#1a2a1a'}}, axisLabel:{color:'#3a5a4a',fontSize:9}, splitLine:{show:false} },
  yAxis:{ type:'value', axisLabel:{color:'#3a5a4a',fontSize:9}, splitLine:{lineStyle:{color:'rgba(0,255,128,.04)'}} },
  tooltip:{ trigger:'axis' },
  series:[
    { type:'line', data:cf5v.map((v,i)=>[s[i],v]), smooth:true, symbol:'none', lineStyle:{color:'#00ff80',width:1.5}, areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(0,255,128,.15)'},{offset:1,color:'rgba(0,255,128,0)'}])} },
    { type:'line', data:dv.map((v,i)=>[s[i],v]), smooth:true, symbol:'none', lineStyle:{color:'#ff6600',width:1.5},
      markLine:{ silent:true, symbol:'none', lineStyle:{color:'rgba(255,102,0,.2)',type:'dashed'},
        data:[{ yAxis:9.8, label:{ formatter:'\u03bb_J=9.8', position:'end', color:'#ff6600', fontSize:9 } }]
      }
    }
  ]
});

function animate() {

  controls.update();
  composer.render();
}

  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  chart.resize();
});
