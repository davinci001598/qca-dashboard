// scale to fit
const SCALE = 12;

const scene = new THREE.Scene();

// Camera
const camera = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, 0.5, 200);
camera.position.set(0, 14, 28);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

// Bloom
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 1.0, 0.25, 0.05));

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 5;
controls.maxDistance = 70;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.25;
controls.target.set(0,0,0);
controls.update();

// ============ BACKGROUND STARS ============
const starsGeo = new THREE.BufferGeometry();
const starCount = 6000;
const starPos = new Float32Array(starCount*3);
const starColors = new Float32Array(starCount*3);
for(let i=0;i<starCount;i++){
  const r = 20 + Math.random()*70;
  const theta = Math.random()*Math.PI*2;
  const phi = Math.acos(2*Math.random()-1);
  starPos[i*3] = r*Math.sin(phi)*Math.cos(theta);
  starPos[i*3+1] = r*Math.sin(phi)*Math.sin(theta);
  starPos[i*3+2] = r*Math.cos(phi);
  const c = new THREE.Color().setHSL(Math.random()*0.2+0.55, 0.3, 0.4+Math.random()*0.6);
  starColors[i*3]=c.r; starColors[i*3+1]=c.g; starColors[i*3+2]=c.b;
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
starsGeo.setAttribute('color', new THREE.BufferAttribute(starColors,3));
const starsMat = new THREE.PointsMaterial({
  size: 0.06, vertexColors: true, blending: THREE.AdditiveBlending,
  depthWrite: false, transparent: true, opacity: 0.7
});
scene.add(new THREE.Points(starsGeo, starsMat));

// ============ DECORATIVE RINGS ============
function addRing(r, color, opacity, z, rotation){
  const g = new THREE.TorusGeometry(r, 0.02, 8, 200);
  const m = new THREE.MeshBasicMaterial({color, transparent:true, opacity, blending:THREE.AdditiveBlending, depthWrite:false});
  const mesh = new THREE.Mesh(g,m);
  mesh.position.z = z;
  if(rotation) mesh.rotation[rotation.axis] = rotation.angle;
  return mesh;
}
scene.add(addRing(13, '#00ff80', 0.07, 0, null));
scene.add(addRing(14, '#00ff80', 0.04, 0, null));
scene.add(addRing(8, '#4488cc', 0.05, -3, null));
scene.add(addRing(8.2, '#cc6644', 0.05, 3, null));

// ============ SPRITE TEXTURE ============
function makeGlowSpriteTex(){
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = 128;
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createRadialGradient(64,64,0,64,64,64);
  gradient.addColorStop(0,'rgba(255,255,255,1)');
  gradient.addColorStop(0.08,'rgba(255,255,255,0.95)');
  gradient.addColorStop(0.2,'rgba(255,255,255,0.6)');
  gradient.addColorStop(0.4,'rgba(255,255,255,0.15)');
  gradient.addColorStop(0.7,'rgba(255,255,255,0.02)');
  gradient.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(canvas);
}
const glowTex = makeGlowSpriteTex();

// ============ NODES ============
const nodeMap = {};
const nodeMeshes = [];
const raycasterThresholds = [];

// mass-based scale
const masses = nodes.map(n=>n.mass);
const massMax = Math.max(...masses);
const massMin = Math.min(...masses);
const logMin = Math.log(massMin+1), logMax = Math.log(massMax+1);

nodes.forEach((n,i)=>{
  const logMass = Math.log(n.mass+1);
  const t = (logMass - logMin)/(logMax - logMin);
  const spriteSize = 0.3 + t*1.8;
  
  const mat = new THREE.SpriteMaterial({
    map: glowTex, color: n.color, blending: THREE.AdditiveBlending,
    depthWrite: false, transparent: true, opacity: 0.85
  });
  const sprite = new THREE.Sprite(mat);
  sprite.position.set(n.x*SCALE, n.y*SCALE, n.z*SCALE);
  sprite.scale.set(spriteSize, spriteSize, 1);
  sprite.userData = n;
  sprite.renderOrder = 1;
  scene.add(sprite);
  
  // 中心亮点
  const coreMat = new THREE.SpriteMaterial({
    map: glowTex, color: '#ffffff', blending: THREE.AdditiveBlending,
    depthWrite: false, transparent: true, opacity: 0.9
  });
  const core = new THREE.Sprite(coreMat);
  core.scale.set(spriteSize*0.25, spriteSize*0.25, 1);
  core.renderOrder = 2;
  sprite.add(core);
  
  nodeMap[i] = sprite;
  nodeMeshes.push(sprite);
  raycasterThresholds.push(spriteSize*0.5);
});

// ============ EDGES ============
edges.forEach(e => {
  const a = nodeMap[e.from], b = nodeMap[e.to];
  if(!a||!b) return;
  const p0 = a.position.clone(), p1 = b.position.clone();
  const mid = new THREE.Vector3().addVectors(p0,p1).multiplyScalar(0.5);
  const d = p0.distanceTo(p1);
  mid.z += d * 0.15;
  
  const curve = new THREE.QuadraticBezierCurve3(p0,mid,p1);
  const pts = curve.getPoints(40);
  const geom = new THREE.BufferGeometry().setFromPoints(pts);
  
  const opacity = 0.03 + e.strength*0.15;
  const mat = new THREE.LineBasicMaterial({
    color: new THREE.Color(a.userData.color).lerp(b.userData.color,0.5),
    transparent:true, opacity:Math.min(0.4, opacity),
    blending:THREE.AdditiveBlending, depthWrite:false
  });
  scene.add(new THREE.Line(geom,mat));
});

// ============ RAYCASTER FOR HOVER ============
const raycaster = new THREE.Raycaster();
raycaster.params.Points.threshold = 1.5;
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');

renderer.domElement.addEventListener('mousemove',(e)=>{
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(nodeMeshes);
  if(intersects.length){
    const obj = intersects[0].object;
    const n = obj.userData;
    tooltip.innerHTML = `<span class="gua" style="color:${n.color}">${n.gua}</span><span class="info">mass ${n.mass.toFixed(1)} · ${n.nv}vox · pk ${n.peak.toFixed(3)}</span>`;
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX+18)+'px';
    tooltip.style.top = (e.clientY-10)+'px';
    tooltip.style.opacity = '1';
  } else {
    tooltip.style.opacity = '0';
    setTimeout(()=>{ if(tooltip.style.opacity==='0') tooltip.style.display='none'; }, 200);
  }
});

// ============ ANIMATE ============
let t = 0;
function animate(){
  requestAnimationFrame(animate);
  t += 0.004;
  controls.update();
  composer.render();
}
animate();

addEventListener('resize',()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
});
</script>
