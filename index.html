rom": 61, "to": 62, "color": "#66cc44", "strength": 0.08, "type": "same_upper"}, {"from": 61, "to": 69, "color": "#66cc44", "strength": 0.08, "type": "same_upper"}, {"from": 62, "to": 69, "color": "#66cc44", "strength": 0.08, "type": "same_upper"}, {"from": 63, "to": 71, "color": "#dd4422", "strength": 0.08, "type": "same_upper"}, {"from": 64, "to": 66, "color": "#44cc88", "strength": 0.08, "type": "same_upper"}, {"from": 64, "to": 68, "color": "#44cc88", "strength": 0.08, "type": "same_upper"}, {"from": 66, "to": 68, "color": "#44cc88", "strength": 0.08, "type": "same_upper"}, {"from": 67, "to": 70, "color": "#4488cc", "strength": 0.08, "type": "same_upper"}];
const SCALE = 1.3;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.5, 200);
camera.position.set(0, 12, 26);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 1.0, 0.25, 0.03));

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 5;
controls.maxDistance = 60;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.22;
controls.target.set(0,0,0);
controls.update();

// Stars
const sg = new THREE.BufferGeometry();
const sc = 7000;
const sp = new Float32Array(sc*3), sl = new Float32Array(sc*3);
for(let i=0;i<sc;i++){
  const r=18+Math.random()*75, th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
  sp[i*3]=r*Math.sin(ph)*Math.cos(th); sp[i*3+1]=r*Math.sin(ph)*Math.sin(th); sp[i*3+2]=r*Math.cos(ph);
  const c=new THREE.Color().setHSL(Math.random()*0.22+0.52,0.28,0.35+Math.random()*0.65);
  sl[i*3]=c.r; sl[i*3+1]=c.g; sl[i*3+2]=c.b;
}
sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
sg.setAttribute('color',new THREE.BufferAttribute(sl,3));
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({size:0.06,vertexColors:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0.65})));

// Rings
function ring(r,color,opacity,y){
  const g=new THREE.TorusGeometry(r,0.025,8,200);
  const m=new THREE.MeshBasicMaterial({color,transparent:true,opacity,blending:THREE.AdditiveBlending,depthWrite:false});
  const mesh=new THREE.Mesh(g,m);
  mesh.rotation.x=Math.PI/2;
  mesh.position.y=y;
  return mesh;
}
scene.add(ring(12,'#338855',0.07,5));
scene.add(ring(12.5,'#338855',0.04,5));
scene.add(ring(9,'#334488',0.05,-2));

// Glow texture
function glowTex(){
  const c=document.createElement('canvas');c.width=c.height=128;
  const ctx=c.getContext('2d');
  const g=ctx.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(0.06,'rgba(255,255,255,0.95)');
  g.addColorStop(0.18,'rgba(255,255,255,0.55)');
  g.addColorStop(0.4,'rgba(255,255,255,0.1)');
  g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}
const tex = glowTex();

// Build nodes
const nodeMeshes=[];
nodes.forEach((n,i)=>{
  const isBase = n.type==='base';
  const s = isBase ? n.size*2.5 : n.size*1.6;
  const mat = new THREE.SpriteMaterial({map:tex,color:n.color,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:isBase?0.95:0.8});
  const sprite = new THREE.Sprite(mat);
  sprite.position.set(n.x*SCALE, n.y*SCALE, n.z*SCALE);
  sprite.scale.set(s,s,1);
  sprite.userData = n;
  sprite.renderOrder = isBase?3:1;
  scene.add(sprite);
  // inner core
  const core = new THREE.Sprite(new THREE.SpriteMaterial({map:tex,color:'#ffffff',blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0.95}));
  core.scale.set(s*0.2,s*0.2,1);
  core.renderOrder=isBase?4:2;
  sprite.add(core);
  nodeMeshes.push(sprite);
});

// Edges
edges.forEach(e=>{
  const a=nodeMeshes[e.from], b=nodeMeshes[e.to];
  if(!a||!b)return;
  const p0=a.position.clone(), p1=b.position.clone();
  const mid=new THREE.Vector3().addVectors(p0,p1).multiplyScalar(0.5);
  const d=p0.distanceTo(p1);
  mid.y += d*0.1;
  const curve=new THREE.QuadraticBezierCurve3(p0,mid,p1);
  const pts=curve.getPoints(24);
  const geom=new THREE.BufferGeometry().setFromPoints(pts);
  const opacity = 0.03 + e.strength*0.22;
  scene.add(new THREE.Line(geom,new THREE.LineBasicMaterial({
    color:e.color,transparent:true,opacity:Math.min(0.5,opacity),blending:THREE.AdditiveBlending,depthWrite:false
  })));
});

// Hover
const raycaster=new THREE.Raycaster();
raycaster.params.Points.threshold=1.8;
const mouse=new THREE.Vector2();
const tip=document.getElementById('tooltip');
renderer.domElement.addEventListener('mousemove',(ev)=>{
  mouse.x=(ev.clientX/innerWidth)*2-1; mouse.y=-(ev.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(nodeMeshes);
  if(hits.length){
    const n=hits[0].object.userData;
    let detail = n.type==='base' ? '基础卦 · 八宫之一' : `上卦 ${n.upper} · 下卦 ${n.lower}`;
    tip.innerHTML=`<span class="gua" style="color:${n.color}">${n.id}</span><span class="detail">${detail}</span>`;
    tip.style.display='block'; tip.style.left=(ev.clientX+20)+'px'; tip.style.top=(ev.clientY-10)+'px'; tip.style.opacity='1';
  }else{
    tip.style.opacity='0';
    setTimeout(()=>{if(tip.style.opacity==='0')tip.style.display='none';},200);
  }
});

// Legend
const leg=document.getElementById('legend');
const baseGua=['乾','坤','震','巽','坎','离','艮','兑'];
const baseCol={'乾':'#ff4444','坤':'#4444ff','震':'#66cc44','巽':'#44cc88','坎':'#4488cc','离':'#dd4422','艮':'#aa8866','兑':'#ddaa44'};
baseGua.forEach(g=>{
  const d=document.createElement('div'); d.className='leg';
  d.innerHTML=`<div class="dot" style="background:${baseCol[g]};box-shadow:0 0 8px ${baseCol[g]}"></div>${g}`;
  leg.appendChild(d);
});

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  composer.render();
}
animate();
