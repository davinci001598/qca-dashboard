const S = 1.3;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.5, 200);
camera.position.set(0, 12, 26);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.6;
document.body.appendChild(renderer.domElement);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 1.2, 0.35, 0.02));

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.minDistance = 5; controls.maxDistance = 60;
controls.autoRotate = true; controls.autoRotateSpeed = 0.22;
controls.target.set(0,0,0); controls.update();

// Stars (brighter)
const sg = new THREE.BufferGeometry();
const sc = 7000;
const sp = new Float32Array(sc*3), sl = new Float32Array(sc*3);
for(let i=0;i<sc;i++){
  const r=18+Math.random()*75, th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
  sp[i*3]=r*Math.sin(ph)*Math.cos(th); sp[i*3+1]=r*Math.sin(ph)*Math.sin(th); sp[i*3+2]=r*Math.cos(ph);
  const c=new THREE.Color().setHSL(Math.random()*0.22+0.52, 0.3, 0.5+Math.random()*0.5);
  sl[i*3]=c.r; sl[i*3+1]=c.g; sl[i*3+2]=c.b;
}
sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
sg.setAttribute('color',new THREE.BufferAttribute(sl,3));
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({size:0.08,vertexColors:true,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0.85})));

// Glow tex
function glowTex(){
  const c=document.createElement('canvas');c.width=c.height=128;
  const ctx=c.getContext('2d');
  const g=ctx.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(0.05,'rgba(255,255,255,0.98)');
  g.addColorStop(0.15,'rgba(255,255,255,0.7)');
  g.addColorStop(0.35,'rgba(255,255,255,0.2)');
  g.addColorStop(0.7,'rgba(255,255,255,0.02)');
  g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}
const tex = glowTex();

// Nodes
const nodeMeshes=[];
nodes.forEach((n,i)=>{
  const isB = n.type==='base';
  const s = isB ? n.size*3.0 : n.size*2.0;
  const mat = new THREE.SpriteMaterial({map:tex,color:n.color,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:1.0});
  const sprite = new THREE.Sprite(mat);
  sprite.position.set(n.x*S, n.y*S, n.z*S);
  sprite.scale.set(s,s,1);
  sprite.userData = n;
  sprite.renderOrder = isB?3:1;
  scene.add(sprite);
  const core = new THREE.Sprite(new THREE.SpriteMaterial({map:tex,color:'#ffffff',blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:1.0}));
  core.scale.set(s*0.22,s*0.22,1);
  core.renderOrder=isB?4:2;
  sprite.add(core);
  nodeMeshes.push(sprite);
});

// Edges (MUCH brighter)
edges.forEach(e=>{
  const a=nodeMeshes[e.from], b=nodeMeshes[e.to];
  if(!a||!b)return;
  const p0=a.position.clone(), p1=b.position.clone();
  const mid=new THREE.Vector3().addVectors(p0,p1).multiplyScalar(0.5);
  mid.y += p0.distanceTo(p1)*0.1;
  const curve=new THREE.QuadraticBezierCurve3(p0,mid,p1);
  const pts=curve.getPoints(24);
  const geom=new THREE.BufferGeometry().setFromPoints(pts);
  // base->composite edges: much brighter
  const isBaseEdge = e.type==='upper'||e.type==='lower';
  const opacity = isBaseEdge ? 0.15 + e.strength*0.5 : 0.04;
  scene.add(new THREE.Line(geom,new THREE.LineBasicMaterial({
    color:e.color,transparent:true,opacity:Math.min(0.8,opacity),
    blending:THREE.AdditiveBlending,depthWrite:false
  })));
});

// Hover
const raycaster=new THREE.Raycaster();
raycaster.params.Points.threshold=2.0;
const mouse=new THREE.Vector2();
const tip=document.getElementById('tooltip');
renderer.domElement.addEventListener('mousemove',(ev)=>{
  mouse.x=(ev.clientX/innerWidth)*2-1; mouse.y=-(ev.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(nodeMeshes);
  if(hits.length){
    const n=hits[0].object.userData;
    const d=n.type==='base'?'基础卦':`上${n.upper} · 下${n.lower}`;
    tip.innerHTML=`<span class="gua" style="color:${n.color}">${n.id}</span><span class="detail">${d}</span>`;
    tip.style.display='block';tip.style.left=(ev.clientX+20)+'px';tip.style.top=(ev.clientY-10)+'px';tip.style.opacity='1';
  }else{tip.style.opacity='0';setTimeout(()=>{if(tip.style.opacity==='0')tip.style.display='none';},200);}
});

function animate(){requestAnimationFrame(animate);controls.update();composer.render();}
animate();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);});
