scene.fog = new THREE.FogExp2(0x000000, 0.00015);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.5, 200);
camera.position.set(35, 20, 45);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Bloom
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight), 0.6, 0.2, 0.1
);
composer.addPass(bloomPass);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 10;
controls.maxDistance = 80;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;

// --- Particle system ---
const count = points.length;
const positions = new Float32Array(count * 3);
const colors = new Float32Array(count * 3);
const sizes = new Float32Array(count);

const colorLow = new THREE.Color('#003366');
const colorMid = new THREE.Color('#0099ff');
const colorHigh = new THREE.Color('#ff6600');
const colorPeak = new THREE.Color('#ffffff');

for (let i = 0; i < count; i++) {
  const p = points[i];
  positions[i*3] = p.x;
  positions[i*3+1] = p.y;
  positions[i*3+2] = p.z;

  const v = p.v;
  let c;
  if (v < 0.25) c = colorLow.clone().lerp(colorMid, v / 0.25);
  else if (v < 0.6) c = colorMid.clone().lerp(colorHigh, (v - 0.25) / 0.35);
  else if (v < 0.9) c = colorHigh.clone().lerp(colorPeak, (v - 0.6) / 0.3);
  else c = colorPeak;

  colors[i*3] = c.r;
  colors[i*3+1] = c.g;
  colors[i*3+2] = c.b;
  sizes[i] = 0.15 + v * 0.85;
}

const geom = new THREE.BufferGeometry();
geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
geom.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

const mat = new THREE.PointsMaterial({
  size: 0.28,
  vertexColors: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  transparent: true,
  opacity: 0.85
});

const cloud = new THREE.Points(geom, mat);
scene.add(cloud);

// --- Grid + axes ---
const gridHelper = new THREE.PolarGridHelper(24, 32, 24, 64, 0x003322, 0x001a11);
scene.add(gridHelper);

// Stars background
const starsGeom = new THREE.BufferGeometry();
const starsCount = 2000;
const starsPos = new Float32Array(starsCount * 3);
for (let i = 0; i < starsCount * 3; i++) starsPos[i] = (Math.random() - 0.5) * 120;
starsGeom.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
const starsMat = new THREE.PointsMaterial({ color:0x334455, size:0.08, blending:THREE.AdditiveBlending, depthWrite:false });
scene.add(new THREE.Points(starsGeom, starsMat));

// --- ECharts observables ---
const hist = [{"s":0,"cf5":0.6098416447639465,"mx":0.09050500392913818,"dist":20.771616935731558},{"s":200,"cf5":0.18263624608516693,"mx":0.01438140869140625,"dist":22.02083396911621},{"s":400,"cf5":0.3073189854621887,"mx":0.15958628058433533,"dist":23.148039817810215},{"s":600,"cf5":0.4949021637439728,"mx":0.7969736456871033,"dist":22.86911392211922},{"s":800,"cf5":0.4223525822162628,"mx":0.8801703453063965,"dist":21.243942260742188},{"s":1000,"cf5":0.3530843257904053,"mx":0.14160428941249847,"dist":18.57414722442676},{"s":1199,"cf5":0.3181414306163788,"mx":0.6049203276634216,"dist":14.281894683838527}];
const s = hist.map(h => h.s);
const cf5 = hist.map(h => h.cf5);
const mx = hist.map(h => h.mx);
const dist = hist.map(h => h.dist);
const lJ = 9.8;

const chartDom = document.getElementById('chart-panel');
const chart = echarts.init(chartDom);
chart.setOption({
  backgroundColor:'transparent',
  grid:{ left:50, right:15, top:8, bottom:15 },
  xAxis:{
    type:'value', name:'步数', nameTextStyle:{ color:'#3a5a4a' },
    axisLine:{ lineStyle:{ color:'#1a2a1a' } },
    axisLabel:{ color:'#3a5a4a', fontSize:9 }, splitLine:{ show:false }
  },
  yAxis:{
    type:'value', name:'cf5 / dist',
    axisLabel:{ color:'#3a5a4a', fontSize:9 },
    splitLine:{ lineStyle:{ color:'rgba(0,255,128,.04)' } }
  },
  tooltip:{ trigger:'axis' },
  series:[
    {
      type:'line', data:cf5.map((v,i)=>[s[i],v]),
      smooth:true, symbol:'none',
      lineStyle:{ color:'#00ff80', width:1.5 },
      areaStyle:{ color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(0,255,128,.15)'},{offset:1,color:'rgba(0,255,128,0)'}]) }
    },
    {
      type:'line', data:dist.map((v,i)=>[s[i],v]),
      smooth:true, symbol:'none',
      lineStyle:{ color:'#ff6600', width:1.5 },
      markLine: {
        silent:true, symbol:'none',
        lineStyle:{ color:'rgba(255,102,0,.2)', type:'dashed' },
        data:[{ yAxis:lJ, label:{ formatter:'λ_J=""" + str(params['lambda_J']) + """', position:'end', color:'#ff6600', fontSize:9 } }]
      }
    }
  ]
});

// --- Animate ---
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  composer.render();
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  chart.resize();
});
</script>
</body>
</html>
