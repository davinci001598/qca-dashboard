const SCALE = 12;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, 0.5, 200);
camera.position.set(0, 14, 28);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight), 0.9, 0.22, 0.04));

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 5;
controls.maxDistance = 70;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.25;
controls.target.set(0,0,0);
controls.update();

// Stars
const starsGeo = new THREE.BufferGeometry();
const starCount = 6000;
const starPos = new Float32Array(starCount*3);
const starColors = new Float32Array(starCount*3);
for(let i=0;i<starCount;i++){
  const r = 20+Math.random()*70;
  const theta = Math.random()*Math.PI*2;
  const phi = Math.acos(2*Math.random()-1);
  starPos[i*3]=r*Math.sin(phi)*Math.cos(theta);
  starPos[i*3+1]=r*Math.sin(phi)*Math.sin(theta);
  starPos[i*3+2]=r*Math.cos(phi);
  const c = new THREE.Color().setHSL(Math.random()*0.2+0.55, 0.3, 0.4+Math.random()*0.6);
  starColors[i*3]=c.r; starColors[i*3+1]=c.g; starColors[i*3+2]=c.b;
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
starsGeo.setAttribute('color', new THREE.BufferAttribute(starColors,3));
scene.add(new THREE.Points(starsGeo, new THREE.PointsMaterial({
  size:0.06, vertexColors:true, blending:THREE.AdditiveBlending, depthWrite:false, transparent:true, opacity:0.7
})));

// Rings
function ring(r,color,opacity,z){
  const g = new THREE.TorusGeometry(r,0.02,8,200);
  const m = new THREE.MeshBasicMaterial({color,transparent:true,opacity,blending:THREE.AdditiveBlending,depthWrite:false});
  const mesh = new THREE.Mesh(g,m);
  mesh.position.z = z;
  return mesh;
}
scene.add(ring(13,'#00ff80',0.07,0));
scene.add(ring(14,'#00ff80',0.04,0));
scene.add(ring(8,'#4488cc',0.05,-3));
scene.add(ring(8.2,'#cc6644',0.05,3));

// Glow texture
function makeGlowTex(){
  const c=document.createElement('canvas');
  c.width=c.height=128;
  const ctx=c.getContext('2d');
  const g=ctx.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(0.08,'rgba(255,255,255,0.95)');
  g.addColorStop(0.2,'rgba(255,255,255,0.6)');
  g.addColorStop(0.4,'rgba(255,255,255,0.15)');
  g.addColorStop(0.7,'rgba(255,255,255,0.02)');
  g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}
const glowTex = makeGlowTex();

// Nodes
const nodeMap = {};
const nodeMeshes = [];
const masses = nodes.map(n=>n.mass);
const logMin = Math.log(Math.min(...masses)+1), logMax = Math.log(Math.max(...masses)+1);

nodes.forEach((n,i)=>{
  const t = (Math.log(n.mass+1)-logMin)/(logMax-logMin);
  const s = 0.3 + t*1.8;
  const mat = new THREE.SpriteMaterial({map:glowTex,color:n.color,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0.85});
  const sprite = new THREE.Sprite(mat);
  sprite.position.set(n.x*SCALE,n.y*SCALE,n.z*SCALE);
  sprite.scale.set(s,s,1);
  sprite.userData = n;
  sprite.renderOrder = 1;
  scene.add(sprite);
  const core = new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex,color:'#ffffff',blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0.9}));
  core.scale.set(s*0.25,s*0.25,1);
  core.renderOrder=2;
  sprite.add(core);
  nodeMap[i]=sprite;
  nodeMeshes.push(sprite);
});

// Edges
edges.forEach(e=>{
  const a=nodeMap[e.from],b=nodeMap[e.to];
  if(!a||!b)return;
  const mid=new THREE.Vector3().addVectors(a.position,b.position).multiplyScalar(0.5);
  mid.z+=a.position.distanceTo(b.position)*0.12;
  const curve=new THREE.QuadraticBezierCurve3(a.position,mid,b.position);
  const pts=curve.getPoints(30);
  const geom=new THREE.BufferGeometry().setFromPoints(pts);
  const opacity=0.02+e.strength*0.08;
  scene.add(new THREE.Line(geom,new THREE.LineBasicMaterial({
    color:new THREE.Color(a.userData.color).lerp(b.userData.color,0.5),
    transparent:true,opacity:Math.min(0.35,opacity),blending:THREE.AdditiveBlending,depthWrite:false
  })));
});

// Raycaster hover
const raycaster = new THREE.Raycaster();
raycaster.params.Points.threshold = 1.5;
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');
renderer.domElement.addEventListener('mousemove',(e)=>{
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(nodeMeshes);
  if(hits.length){
    const n=hits[0].object.userData;
    tooltip.innerHTML=`<span class="gua" style="color:${n.color}">${n.gua}</span><span class="info">mass ${n.mass.toFixed(1)} · ${n.nv}vox · pk ${n.peak.toFixed(3)}</span>`;
    tooltip.style.display='block';
    tooltip.style.left=(e.clientX+18)+'px';
    tooltip.style.top=(e.clientY-10)+'px';
    tooltip.style.opacity='1';
  }else{
    tooltip.style.opacity='0';
    setTimeout(()=>{if(tooltip.style.opacity==='0')tooltip.style.display='none';},200);
  }
});

// Animate
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  composer.render();
}
animate();

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  composer.setSize(innerWidth,innerHeight);
});
</script>
</body>
