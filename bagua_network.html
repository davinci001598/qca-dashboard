<body>
<canvas id="c"></canvas>
<div id="title">GRAVITATIONAL CLUSTER · BAGUA<span>v7 密度场团簇 · 太极+阴阳+八卦 · 引力连线</span></div>
<div id="hint">拖拽旋转 · 滚轮缩放 · 连线粗细=引力强度</div>

<script>
const nodes = [{"id": "太极", "x": 0, "y": 0, "z": 0, "mass": 3.7507, "color": "#ffffff", "size": 2.5, "label": "太极 · m=3.75"}, {"id": "阴", "x": -4, "y": 2, "z": 0, "mass": 11.8091, "color": "#0044ff", "size": 3.5, "label": "阴 · z=19 · m=11.8"}, {"id": "阳", "x": 4, "y": -2, "z": 0, "mass": 11.8081, "color": "#ff6600", "size": 3.5, "label": "阳 · z=29 · m=11.8"}, {"id": "乾", "x": 0.0, "y": -10.0, "z": 0, "mass": 2.51, "color": "#ff4444", "size": 1.8, "label": "乾 · m=2.51"}, {"id": "兑", "x": 7.1, "y": -7.1, "z": 0, "mass": 1.037, "color": "#ff8844", "size": 1.8, "label": "兑 · m=1.037"}, {"id": "离", "x": 10.0, "y": 0.0, "z": 0, "mass": 1.037, "color": "#ffcc00", "size": 1.8, "label": "离 · m=1.037"}, {"id": "震", "x": 7.1, "y": 7.1, "z": 0, "mass": 1.037, "color": "#44ff44", "size": 1.8, "label": "震 · m=1.037"}, {"id": "巽", "x": 0.0, "y": 10.0, "z": 0, "mass": 1.0369, "color": "#00cc88", "size": 1.8, "label": "巽 · m=1.037"}, {"id": "坎", "x": -7.1, "y": 7.1, "z": 0, "mass": 1.0368, "color": "#0044ff", "size": 1.8, "label": "坎 · m=1.037"}, {"id": "艮", "x": -10.0, "y": 0.0, "z": 0, "mass": 1.0368, "color": "#8844ff", "size": 1.8, "label": "艮 · m=1.037"}, {"id": "坤", "x": -7.1, "y": -7.1, "z": 0, "mass": 1.0368, "color": "#ff44ff", "size": 1.8, "label": "坤 · m=1.037"}];
const edges = [{"from": 0, "to": 1, "gravity": 2.2146, "dist": 4.5, "strength": 1.0}, {"from": 0, "to": 2, "gravity": 2.2144, "dist": 4.5, "strength": 1.0}, {"from": 0, "to": 3, "gravity": 0.0941, "dist": 10.0, "strength": 0.042}, {"from": 0, "to": 4, "gravity": 0.0386, "dist": 10.0, "strength": 0.017}, {"from": 0, "to": 5, "gravity": 0.0389, "dist": 10.0, "strength": 0.018}, {"from": 0, "to": 6, "gravity": 0.0386, "dist": 10.0, "strength": 0.017}, {"from": 0, "to": 7, "gravity": 0.0389, "dist": 10.0, "strength": 0.018}, {"from": 0, "to": 8, "gravity": 0.0386, "dist": 10.0, "strength": 0.017}, {"from": 0, "to": 9, "gravity": 0.0389, "dist": 10.0, "strength": 0.018}, {"from": 0, "to": 10, "gravity": 0.0386, "dist": 10.0, "strength": 0.017}, {"from": 1, "to": 2, "gravity": 1.743, "dist": 8.9, "strength": 0.787}, {"from": 1, "to": 3, "gravity": 0.1853, "dist": 12.6, "strength": 0.084}, {"from": 1, "to": 4, "gravity": 0.0594, "dist": 14.4, "strength": 0.027}, {"from": 1, "to": 5, "gravity": 0.0612, "dist": 14.1, "strength": 0.028}, {"from": 1, "to": 6, "gravity": 0.0821, "dist": 12.2, "strength": 0.037}, {"from": 1, "to": 7, "gravity": 0.1531, "dist": 8.9, "strength": 0.069}, {"from": 1, "to": 8, "gravity": 0.3437, "dist": 6.0, "strength": 0.155}, {"from": 1, "to": 9, "gravity": 0.3061, "dist": 6.3, "strength": 0.138}, {"from": 1, "to": 10, "gravity": 0.1325, "dist": 9.6, "strength": 0.06}, {"from": 2, "to": 3, "gravity": 0.3705, "dist": 8.9, "strength": 0.167}, {"from": 2, "to": 4, "gravity": 0.3438, "dist": 6.0, "strength": 0.155}, {"from": 2, "to": 5, "gravity": 0.3061, "dist": 6.3, "strength": 0.138}, {"from": 2, "to": 6, "gravity": 0.1325, "dist": 9.6, "strength": 0.06}, {"from": 2, "to": 7, "gravity": 0.0765, "dist": 12.6, "strength": 0.035}, {"from": 2, "to": 8, "gravity": 0.0594, "dist": 14.4, "strength": 0.027}, {"from": 2, "to": 9, "gravity": 0.0612, "dist": 14.1, "strength": 0.028}, {"from": 2, "to": 10, "gravity": 0.082, "dist": 12.2, "strength": 0.037}, {"from": 3, "to": 4, "gravity": 0.0443, "dist": 7.7, "strength": 0.02}, {"from": 3, "to": 5, "gravity": 0.013, "dist": 14.1, "strength": 0.006}, {"from": 3, "to": 9, "gravity": 0.013, "dist": 14.1, "strength": 0.006}, {"from": 3, "to": 10, "gravity": 0.0442, "dist": 7.7, "strength": 0.02}, {"from": 4, "to": 5, "gravity": 0.0183, "dist": 7.7, "strength": 0.008}, {"from": 5, "to": 6, "gravity": 0.0183, "dist": 7.7, "strength": 0.008}, {"from": 6, "to": 7, "gravity": 0.0183, "dist": 7.7, "strength": 0.008}, {"from": 7, "to": 8, "gravity": 0.0183, "dist": 7.7, "strength": 0.008}, {"from": 8, "to": 9, "gravity": 0.0183, "dist": 7.7, "strength": 0.008}, {"from": 9, "to": 10, "gravity": 0.0183, "dist": 7.7, "strength": 0.008}];

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, cx, cy, scale = 1.8, angle = 0;
let isDragging = false, lastX, lastY, dragAngle = 0, dragAngleOff = 0;

function resize() {
  W = canvas.width = window.innerWidth * devicePixelRatio;
  H = canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  cx = W/2; cy = H/2;
}
resize();
window.addEventListener('resize', resize);

// Camera
let cam = { rotX: -0.35, rotY: 0, zoom: 1.8 };

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  cam.zoom *= e.deltaY > 0 ? 1.08 : 0.93;
  cam.zoom = Math.max(0.5, Math.min(5, cam.zoom));
});

canvas.addEventListener('mousedown', e => {
  isDragging = true; lastX = e.clientX; lastY = e.clientY;
});
canvas.addEventListener('mousemove', e => {
  if (!isDragging) return;
  cam.rotY += (e.clientX - lastX) * 0.008;
  cam.rotX -= (e.clientY - lastY) * 0.008;
  cam.rotX = Math.max(-1.3, Math.min(1.3, cam.rotX));
  lastX = e.clientX; lastY = e.clientY;
});
canvas.addEventListener('mouseup', () => isDragging = false);
canvas.addEventListener('mouseleave', () => isDragging = false);

// Touch
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
  }
});
canvas.addEventListener('touchmove', e => {
  if (!isDragging) return;
  e.preventDefault();
  cam.rotY += (e.touches[0].clientX - lastX) * 0.008;
  cam.rotX -= (e.touches[0].clientY - lastY) * 0.008;
  cam.rotX = Math.max(-1.3, Math.min(1.3, cam.rotX));
  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
}, { passive: false });
canvas.addEventListener('touchend', () => isDragging = false);

function project(x,y,z) {
  // rotate Y
  let cosY = Math.cos(cam.rotY), sinY = Math.sin(cam.rotY);
  let x1 = x*cosY - z*sinY;
  let z1 = x*sinY + z*cosY;
  // rotate X
  let cosX = Math.cos(cam.rotX), sinX = Math.sin(cam.rotX);
  let y1 = y*cosX - z1*sinX;
  let z2 = y*sinX + z1*cosX;
  let f = cam.zoom * 400 / (Math.max(z2 + 20, 1));
  return [cx + x1*f, cy - y1*f, z2];
}

function draw() {
  ctx.clearRect(0,0,W,H);

  // Background grid
  ctx.strokeStyle = 'rgba(0,40,20,0.15)';
  ctx.lineWidth = 1;
  const gs = 60;
  for (let x = gs; x < W; x += gs) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = gs; y < H; y += gs) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // Stars
  angle += 0.0003;
  for (let i = 0; i < 200; i++) {
    const sx = ((i*7919 + 104729) % W);
    const sy = ((i*6271 + 2147483647) % H);
    const a = 0.15 + 0.35 * Math.sin(angle * 3 + i);
    ctx.fillStyle = `rgba(50,80,70,${a})`;
    ctx.fillRect(sx, sy, 2, 2);
  }

  // Project nodes
  const pnodes = nodes.map(n => {
    const [px,py,pz] = project(n.x, n.y, n.z);
    return { ...n, px, py, pz };
  });

  // Draw edges (back to front)
  const sortedEdges = edges.slice().sort((a,b) => {
    const za = (pnodes[a.from].pz + pnodes[a.to].pz)/2;
    const zb = (pnodes[b.from].pz + pnodes[b.to].pz)/2;
    return za - zb;
  });

  sortedEdges.forEach(e => {
    const a = pnodes[e.from], b = pnodes[e.to];
    const mx = (a.px + b.px)/2, my = (a.py + b.py)/2;
    const d = Math.sqrt((b.px-a.px)**2 + (b.py-a.py)**2);
    const ox = (b.py - a.py) / d * d * 0.25;
    const oy = -(b.px - a.px) / d * d * 0.25;

    ctx.beginPath();
    ctx.moveTo(a.px, a.py);
    ctx.quadraticCurveTo(mx + ox, my + oy, b.px, b.py);
    ctx.strokeStyle = `rgba(0,255,128,${0.12 + e.strength * 0.5})`;
    ctx.lineWidth = 0.5 + e.strength * 4;
    ctx.shadowColor = 'rgba(0,255,128,0.6)';
    ctx.shadowBlur = e.strength * 8;
    ctx.stroke();
    ctx.shadowBlur = 0;
  });

  // Sort nodes by depth
  const sortedNodes = pnodes.slice().sort((a,b) => a.pz - b.pz);

  sortedNodes.forEach(n => {
    const r = 6 + n.size * 6;
    const grd = ctx.createRadialGradient(n.px, n.py, 0, n.px, n.py, r);
    grd.addColorStop(0, n.color);
    grd.addColorStop(0.4, n.color + 'cc');
    grd.addColorStop(1, 'transparent');

    // Glow
    ctx.beginPath();
    ctx.arc(n.px, n.py, r*2.2, 0, Math.PI*2);
    ctx.fillStyle = n.color + '11';
    ctx.fill();

    // Node
    ctx.beginPath();
    ctx.arc(n.px, n.py, r, 0, Math.PI*2);
    ctx.fillStyle = grd;
    ctx.shadowColor = n.color;
    ctx.shadowBlur = 18;
    ctx.fill();
    ctx.shadowBlur = 0;

    // Border
    ctx.beginPath();
    ctx.arc(n.px, n.py, r, 0, Math.PI*2);
    ctx.strokeStyle = n.color + '88';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Label
    if (n.pz > -10) {
      ctx.font = `${n.id==='太极'?'bold 14px':'12px'} "Microsoft YaHei","PingFang SC",sans-serif`;
      ctx.fillStyle = n.color;
      ctx.textAlign = 'center';
      ctx.shadowColor = n.color;
      ctx.shadowBlur = 6;
      ctx.fillText(n.id, n.px, n.py + r + 16);
      ctx.shadowBlur = 0;

      // Mass label
      ctx.font = '9px "Microsoft YaHei","PingFang SC",sans-serif';
      ctx.fillStyle = '#3a5a4a';
      ctx.fillText('m=' + n.mass.toFixed(1), n.px, n.py + r + 30);
    }
  });

  requestAnimationFrame(draw);
}
draw();
</script>
