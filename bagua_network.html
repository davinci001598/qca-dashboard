<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bagua · Gravitational Cluster Network</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050810;overflow:hidden;font-family:"Microsoft YaHei","PingFang SC",sans-serif;cursor:grab}
body:active{cursor:grabbing}
canvas{display:block}
#title{position:fixed;top:14px;left:18px;color:#00ff80;font-size:13px;letter-spacing:2px;z-index:10;pointer-events:none}
#title span{color:#3a5a4a;font-size:10px;display:block;margin-top:2px}
#info{position:fixed;bottom:80px;left:18px;color:#3a5a4a;font-size:9px;z-index:10;pointer-events:none;line-height:1.6}
#hint{position:fixed;bottom:12px;right:16px;color:#3a5a4a;font-size:10px;z-index:10;pointer-events:none;text-align:right}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">GRAVITATIONAL CLUSTER · BAGUA<span>v7 密度场团簇引力网络 · 31条边(数据驱动) · 连线粗细=引力强度</span></div>
<div id="info"></div>
<div id="hint">拖拽旋转 · 滚轮缩放 · 右键平移</div>

<script>
const nodes = [{"id": "#142", "x": 3.4, "y": 3.4, "z": -4.5, "mass": 11.8091, "orig_pos": "(24,24,19)", "label": "太极", "color": "#ffffff"}, {"id": "#196", "x": 3.4, "y": 3.4, "z": 8.5, "mass": 11.8081, "orig_pos": "(24,24,29)", "label": "阴", "color": "#0044ff"}, {"id": "#177", "x": 3.4, "y": 3.4, "z": 2.0, "mass": 3.7507, "orig_pos": "(24,24,24)", "label": "阳", "color": "#ff6600"}, {"id": "#1", "x": -30.3, "y": -30.3, "z": -26.2, "mass": 2.51, "orig_pos": "(1,1,2)", "label": "乾", "color": "#ff4444"}, {"id": "#199", "x": -0.3, "y": -0.3, "z": 8.2, "mass": 1.037, "orig_pos": "(22,22,29)", "label": "兑", "color": "#ff8844"}, {"id": "#201", "x": -0.3, "y": 7.1, "z": 8.2, "mass": 1.037, "orig_pos": "(22,26,29)", "label": "离", "color": "#ffcc00"}, {"id": "#202", "x": 7.1, "y": 7.1, "z": 8.2, "mass": 1.037, "orig_pos": "(26,26,29)", "label": "震", "color": "#44ff44"}, {"id": "#200", "x": 7.1, "y": -0.3, "z": 8.2, "mass": 1.0369, "orig_pos": "(26,22,29)", "label": "巽", "color": "#00cc88"}, {"id": "#168", "x": -0.3, "y": -0.3, "z": -4.1, "mass": 1.0368, "orig_pos": "(22,22,19)", "label": "坎", "color": "#0044ff"}, {"id": "#169", "x": 7.1, "y": -0.3, "z": -4.1, "mass": 1.0368, "orig_pos": "(26,22,19)", "label": "艮", "color": "#8844ff"}, {"id": "#170", "x": -0.3, "y": 7.1, "z": -4.1, "mass": 1.0368, "orig_pos": "(22,26,19)", "label": "坤", "color": "#ff44ff"}];
const edges = [{"from": 0, "to": 1, "gravity": 0.8251, "strength": 0.787}, {"from": 0, "to": 2, "gravity": 1.0483, "strength": 1.0}, {"from": 0, "to": 3, "gravity": 0.0108, "strength": 0.01}, {"from": 0, "to": 4, "gravity": 0.0649, "strength": 0.062}, {"from": 0, "to": 5, "gravity": 0.0649, "strength": 0.062}, {"from": 0, "to": 6, "gravity": 0.0649, "strength": 0.062}, {"from": 0, "to": 7, "gravity": 0.0649, "strength": 0.062}, {"from": 0, "to": 8, "gravity": 0.4446, "strength": 0.424}, {"from": 0, "to": 9, "gravity": 0.4446, "strength": 0.424}, {"from": 0, "to": 10, "gravity": 0.4446, "strength": 0.424}, {"from": 1, "to": 2, "gravity": 1.0483, "strength": 1.0}, {"from": 1, "to": 4, "gravity": 0.4458, "strength": 0.425}, {"from": 1, "to": 5, "gravity": 0.4458, "strength": 0.425}, {"from": 1, "to": 6, "gravity": 0.4458, "strength": 0.425}, {"from": 1, "to": 7, "gravity": 0.4457, "strength": 0.425}, {"from": 1, "to": 8, "gravity": 0.0658, "strength": 0.063}, {"from": 1, "to": 9, "gravity": 0.0658, "strength": 0.063}, {"from": 1, "to": 10, "gravity": 0.0658, "strength": 0.063}, {"from": 2, "to": 4, "gravity": 0.0591, "strength": 0.056}, {"from": 2, "to": 5, "gravity": 0.0591, "strength": 0.056}, {"from": 2, "to": 6, "gravity": 0.0591, "strength": 0.056}, {"from": 2, "to": 7, "gravity": 0.0591, "strength": 0.056}, {"from": 2, "to": 8, "gravity": 0.0602, "strength": 0.057}, {"from": 2, "to": 9, "gravity": 0.0602, "strength": 0.057}, {"from": 2, "to": 10, "gravity": 0.0602, "strength": 0.057}, {"from": 4, "to": 5, "gravity": 0.0196, "strength": 0.019}, {"from": 4, "to": 7, "gravity": 0.0196, "strength": 0.019}, {"from": 5, "to": 6, "gravity": 0.0196, "strength": 0.019}, {"from": 6, "to": 7, "gravity": 0.0196, "strength": 0.019}, {"from": 8, "to": 9, "gravity": 0.0196, "strength": 0.019}, {"from": 8, "to": 10, "gravity": 0.0196, "strength": 0.019}];

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, cx, cy;
let cam = { rotX: -0.5, rotY: 0.4, zoom: 1.0, tx: 0, ty: 0 };
let isDragging = false, isPanning = false, lastX, lastY;

function resize() {
  W = canvas.width = window.innerWidth * devicePixelRatio;
  H = canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  cx = W/2; cy = H/2;
}
resize();
window.addEventListener('resize', resize);

// Input
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  cam.zoom *= e.deltaY > 0 ? 1.06 : 0.94;
  cam.zoom = Math.max(0.15, Math.min(4, cam.zoom));
});
canvas.addEventListener('mousedown', e => {
  if (e.button === 2 || e.ctrlKey) { isPanning = true; }
  else { isDragging = true; }
  lastX = e.clientX; lastY = e.clientY;
});
canvas.addEventListener('mousemove', e => {
  if (isDragging) {
    cam.rotY += (e.clientX - lastX) * 0.006;
    cam.rotX -= (e.clientY - lastY) * 0.006;
    cam.rotX = Math.max(-1.5, Math.min(1.5, cam.rotX));
  } else if (isPanning) {
    cam.tx += (e.clientX - lastX) * 2 / cam.zoom;
    cam.ty -= (e.clientY - lastY) * 2 / cam.zoom;
  }
  lastX = e.clientX; lastY = e.clientY;
});
canvas.addEventListener('mouseup', () => { isDragging = false; isPanning = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

function project(x,y,z) {
  // Rotate Y
  let cosY = Math.cos(cam.rotY), sinY = Math.sin(cam.rotY);
  let x1 = x*cosY - z*sinY;
  let z1 = x*sinY + z*cosY;
  // Rotate X
  let cosX = Math.cos(cam.rotX), sinX = Math.sin(cam.rotX);
  let y1 = y*cosX - z1*sinX;
  let z2 = y*sinX + z1*cosX;
  let f = cam.zoom * 500 / Math.max(z2 + 35, 2);
  return [cx + (x1 + cam.tx)*f, cy - (y1 + cam.ty)*f, z2];
}

// Build info
let infoHtml = '<b style="color:#00ff80">引力层级</b><br/>';
const sortedEdges = edges.slice().sort((a,b) => b.strength - a.strength);
const shown = sortedEdges.slice(0, 10);
shown.forEach(e => {
  infoHtml += `<span style="color:${nodes[e.from].color}">${nodes[e.from].label}</span> ↔ <span style="color:${nodes[e.to].color}">${nodes[e.to].label}</span> <span style="color:#5a7a6a">${(e.strength*100).toFixed(0)}%</span><br/>`;
});
document.getElementById('info').innerHTML = infoHtml;

function draw() {
  ctx.clearRect(0,0,W,H);

  // Stars
  for (let i = 0; i < 300; i++) {
    const sx = ((i*7919 + 104729) % W);
    const sy = ((i*6271 + 2147483647) % H);
    const a = 0.12 + 0.25 * Math.sin(Date.now()*0.0003 + i);
    ctx.fillStyle = `rgba(60,100,80,${a})`;
    ctx.fillRect(sx, sy, 2, 2);
  }

  // Project all nodes
  const pnodes = nodes.map(n => { const [px,py,pz] = project(n.x,n.y,n.z); return {...n,px,py,pz}; });

  // Sort edges by avg depth
  const sortedEdges = edges.slice().sort((a,b) => {
    const za = (pnodes[a.from].pz + pnodes[a.to].pz)/2;
    const zb = (pnodes[b.from].pz + pnodes[b.to].pz)/2;
    return za - zb;
  });

  // Draw edges
  sortedEdges.forEach(e => {
    const a = pnodes[e.from], b = pnodes[e.to];
    const d = Math.sqrt((b.px-a.px)**2 + (b.py-a.py)**2);
    const ox = (b.py - a.py) / (d||1) * d * 0.15;
    const oy = -(b.px - a.px) / (d||1) * d * 0.15;
    const mx = (a.px + b.px)/2 + ox;
    const my = (a.py + b.py)/2 + oy;

    const midColor = (() => {
      const ca = a.color, cb = b.color;
      const r = (parseInt(ca.slice(1,3),16) + parseInt(cb.slice(1,3),16))/2;
      const g = (parseInt(ca.slice(3,5),16) + parseInt(cb.slice(3,5),16))/2;
      const bl = (parseInt(ca.slice(5,7),16) + parseInt(cb.slice(5,7),16))/2;
      return `rgb(${Math.round(r)},${Math.round(g)},${Math.round(bl)})`;
    })();

    ctx.beginPath();
    ctx.moveTo(a.px, a.py);
    ctx.quadraticCurveTo(mx, my, b.px, b.py);

    const alpha = 0.1 + e.strength * 0.5;
    const width = 0.4 + e.strength * 5;
    ctx.strokeStyle = midColor;
    ctx.lineWidth = width;
    ctx.globalAlpha = alpha;
    ctx.shadowColor = midColor;
    ctx.shadowBlur = e.strength * 12;
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  });

  // Sort nodes by depth
  const sortedNodes = pnodes.slice().sort((a,b) => b.pz - a.pz);

  // Draw nodes
  sortedNodes.forEach(n => {
    const mr = 4 + n.mass * 2.5;
    const r = Math.max(mr, 6);

    // Outer glow
    const grdOuter = ctx.createRadialGradient(n.px, n.py, r*0.6, n.px, n.py, r*2.5);
    grdOuter.addColorStop(0, n.color + '33');
    grdOuter.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(n.px, n.py, r*2.5, 0, Math.PI*2);
    ctx.fillStyle = grdOuter;
    ctx.fill();

    // Inner glow
    const grdInner = ctx.createRadialGradient(n.px, n.py, 0, n.px, n.py, r);
    grdInner.addColorStop(0, '#ffffff');
    grdInner.addColorStop(0.3, n.color);
    grdInner.addColorStop(0.7, n.color + '88');
    grdInner.addColorStop(1, 'transparent');

    ctx.beginPath();
    ctx.arc(n.px, n.py, r, 0, Math.PI*2);
    ctx.fillStyle = grdInner;
    ctx.shadowColor = n.color;
    ctx.shadowBlur = 20;
    ctx.fill();
    ctx.shadowBlur = 0;

    // Label
    if (n.pz > -15) {
      ctx.font = 'bold 12px "Microsoft YaHei","PingFang SC",sans-serif';
      ctx.fillStyle = n.color;
      ctx.textAlign = 'center';
      ctx.shadowColor = n.color;
      ctx.shadowBlur = 4;
      ctx.fillText(n.label, n.px, n.py + r + 14);
      ctx.shadowBlur = 0;

      ctx.font = '9px "Microsoft YaHei","PingFang SC",sans-serif';
      ctx.fillStyle = '#3a5a4a';
      ctx.fillText('m=' + n.mass.toFixed(1), n.px, n.py + r + 27);
    }
  });

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
