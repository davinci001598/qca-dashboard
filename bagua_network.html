<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bagua · Gravitational Cluster Network</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:"SF Mono","Cascadia Code",monospace;cursor:grab}
body:active{cursor:grabbing}
canvas{display:block}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#title{position:absolute;top:24px;left:28px;color:#00ff80;font-size:16px;letter-spacing:2px}
#title span{color:#3a5a4a;font-size:11px;display:block;margin-top:4px}
#legend{position:absolute;bottom:24px;left:28px;display:flex;gap:16px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:6px;font-size:10px;color:#5a7a6a}
.leg .dot{width:8px;height:8px;border-radius:50%}
#hint{position:absolute;bottom:24px;right:28px;color:#3a5a4a;font-size:11px;text-align:right}
</style>
</head>
<body>
<div id="overlay">
  <div id="title">GRAVITATIONAL CLUSTER NETWORK · TAICHI BAGUA<span>v7 QCA 密度场团簇提取 · 2大团+1太极+8卦象 · 37条引力连线</span></div>
  <div id="legend"></div>
  <div id="hint">拖拽旋转 · 滚轮缩放 · 右键平移<br/>连线粗细 = 引力强度</div>
</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';
import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';
import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';
import {CSS2DRenderer,CSS2DObject} from 'three/addons/renderers/CSS2DRenderer.js';

const gdata = {"nodes":[{"id":"太极","x":0,"y":0,"z":0,"mass":3.7507,"color":"#ffffff","size":2.5,"label":"太极 · m=3.75"},{"id":"阴","x":-4,"y":2,"z":0,"mass":11.8091,"color":"#0044ff","size":3.5,"label":"阴 · z=19 · m=11.8"},{"id":"阳","x":4,"y":-2,"z":0,"mass":11.8081,"color":"#ff6600","size":3.5,"label":"阳 · z=29 · m=11.8"},{"id":"乾","x":0.0,"y":-10.0,"z":0,"mass":2.51,"color":"#ff4444","size":1.8,"label":"乾 · m=2.51"},{"id":"兑","x":7.1,"y":-7.1,"z":0,"mass":1.037,"color":"#ff8844","size":1.8,"label":"兑 · m=1.037"},{"id":"离","x":10.0,"y":0.0,"z":0,"mass":1.037,"color":"#ffcc00","size":1.8,"label":"离 · m=1.037"},{"id":"震","x":7.1,"y":7.1,"z":0,"mass":1.037,"color":"#44ff44","size":1.8,"label":"震 · m=1.037"},{"id":"巽","x":0.0,"y":10.0,"z":0,"mass":1.0369,"color":"#00cc88","size":1.8,"label":"巽 · m=1.037"},{"id":"坎","x":-7.1,"y":7.1,"z":0,"mass":1.0368,"color":"#0044ff","size":1.8,"label":"坎 · m=1.037"},{"id":"艮","x":-10.0,"y":0.0,"z":0,"mass":1.0368,"color":"#8844ff","size":1.8,"label":"艮 · m=1.037"},{"id":"坤","x":-7.1,"y":-7.1,"z":0,"mass":1.0368,"color":"#ff44ff","size":1.8,"label":"坤 · m=1.037"}],"edges":[{"from":0,"to":1,"gravity":2.2146,"dist":4.5,"strength":1.0},{"from":0,"to":2,"gravity":2.2144,"dist":4.5,"strength":1.0},{"from":0,"to":3,"gravity":0.0941,"dist":10.0,"strength":0.042},{"from":0,"to":4,"gravity":0.0386,"dist":10.0,"strength":0.017},{"from":0,"to":5,"gravity":0.0389,"dist":10.0,"strength":0.018},{"from":0,"to":6,"gravity":0.0386,"dist":10.0,"strength":0.017},{"from":0,"to":7,"gravity":0.0389,"dist":10.0,"strength":0.018},{"from":0,"to":8,"gravity":0.0386,"dist":10.0,"strength":0.017},{"from":0,"to":9,"gravity":0.0389,"dist":10.0,"strength":0.018},{"from":0,"to":10,"gravity":0.0386,"dist":10.0,"strength":0.017},{"from":1,"to":2,"gravity":1.743,"dist":8.9,"strength":0.787},{"from":1,"to":3,"gravity":0.1853,"dist":12.6,"strength":0.084},{"from":1,"to":4,"gravity":0.0594,"dist":14.4,"strength":0.027},{"from":1,"to":5,"gravity":0.0612,"dist":14.1,"strength":0.028},{"from":1,"to":6,"gravity":0.0821,"dist":12.2,"strength":0.037},{"from":1,"to":7,"gravity":0.1531,"dist":8.9,"strength":0.069},{"from":1,"to":8,"gravity":0.3437,"dist":6.0,"strength":0.155},{"from":1,"to":9,"gravity":0.3061,"dist":6.3,"strength":0.138},{"from":1,"to":10,"gravity":0.1325,"dist":9.6,"strength":0.06},{"from":2,"to":3,"gravity":0.3705,"dist":8.9,"strength":0.167},{"from":2,"to":4,"gravity":0.3438,"dist":6.0,"strength":0.155},{"from":2,"to":5,"gravity":0.3061,"dist":6.3,"strength":0.138},{"from":2,"to":6,"gravity":0.1325,"dist":9.6,"strength":0.06},{"from":2,"to":7,"gravity":0.0765,"dist":12.6,"strength":0.035},{"from":2,"to":8,"gravity":0.0594,"dist":14.4,"strength":0.027},{"from":2,"to":9,"gravity":0.0612,"dist":14.1,"strength":0.028},{"from":2,"to":10,"gravity":0.082,"dist":12.2,"strength":0.037},{"from":3,"to":4,"gravity":0.0443,"dist":7.7,"strength":0.02},{"from":3,"to":5,"gravity":0.013,"dist":14.1,"strength":0.006},{"from":3,"to":9,"gravity":0.013,"dist":14.1,"strength":0.006},{"from":3,"to":10,"gravity":0.0442,"dist":7.7,"strength":0.02},{"from":4,"to":5,"gravity":0.0183,"dist":7.7,"strength":0.008},{"from":5,"to":6,"gravity":0.0183,"dist":7.7,"strength":0.008},{"from":6,"to":7,"gravity":0.0183,"dist":7.7,"strength":0.008},{"from":7,"to":8,"gravity":0.0183,"dist":7.7,"strength":0.008},{"from":8,"to":9,"gravity":0.0183,"dist":7.7,"strength":0.008},{"from":9,"to":10,"gravity":0.0183,"dist":7.7,"strength":0.008}]};

// Scene
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,0.5,200);
camera.position.set(0,12,28);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
document.body.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth,window.innerHeight);
labelRenderer.domElement.style.position = 'fixed';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

// Bloom
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth,window.innerHeight),0.7,0.3,0.05));

// Controls
const controls = new OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 5;
controls.maxDistance = 60;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.4;
controls.target.set(0,0,0);

// Stars
const starsG = new THREE.BufferGeometry();
const sc = 3000;
const sp = new Float32Array(sc*3);
for(let i=0;i<sc*3;i++) sp[i]=(Math.random()-0.5)*100;
starsG.setAttribute('position',new THREE.BufferAttribute(sp,3));
scene.add(new THREE.Points(starsG,new THREE.PointsMaterial({color:0x223344,size:0.06,blending:THREE.AdditiveBlending,depthWrite:false})));

// Ring guide
const ringGeom = new THREE.TorusGeometry(10,0.03,16,100);
const ringMat = new THREE.MeshBasicMaterial({color:0x00ff80,transparent:true,opacity:0.15});
const ring = new THREE.Mesh(ringGeom,ringMat);
ring.rotation.x = Math.PI/2;
scene.add(ring);

// Inner ring
const ring2 = new THREE.TorusGeometry(4.5,0.02,16,80);
const ring2m = new THREE.Mesh(ring2,new THREE.MeshBasicMaterial({color:0xff6600,transparent:true,opacity:0.12}));
ring2.rotation.x = Math.PI/2.5;
scene.add(ring2m);

// Nodes
const nodeMeshes = [];
const nodeLabels = [];
const nodeData = gdata.nodes;

nodeData.forEach((nd,i) => {
  // Sphere
  const geom = new THREE.SphereGeometry(nd.size*0.4,32,32);
  const mat = new THREE.MeshStandardMaterial({
    color:nd.color, emissive:nd.color, emissiveIntensity:0.8,
    roughness:0.3, metalness:0.1
  });
  const mesh = new THREE.Mesh(geom,mat);
  mesh.position.set(nd.x,nd.y,nd.z);

  // Glow shell
  const glowGeom = new THREE.SphereGeometry(nd.size*0.55,32,32);
  const glowMat = new THREE.MeshBasicMaterial({color:nd.color,transparent:true,opacity:0.15,blending:THREE.AdditiveBlending,depthWrite:false});
  const glow = new THREE.Mesh(glowGeom,glowMat);
  mesh.add(glow);

  scene.add(mesh);
  nodeMeshes.push(mesh);

  // Label
  const div = document.createElement('div');
  div.textContent = nd.id;
  div.style.cssText = `color:${nd.color};font-size:${i===0?'14px':'11px'};font-weight:600;letter-spacing:1px;text-shadow:0 0 8px ${nd.color}`;
  const label = new CSS2DObject(div);
  label.position.set(0,nd.size*0.8,0);
  mesh.add(label);
  nodeLabels.push(label);
});

// Edges: Bezier curves
gdata.edges.forEach(e => {
  const from = nodeData[e.from];
  const to = nodeData[e.to];
  const p0 = new THREE.Vector3(from.x,from.y,from.z);
  const p1 = new THREE.Vector3(to.x,to.y,to.z);
  const mid = new THREE.Vector3().addVectors(p0,p1).multiplyScalar(0.5);
  // arc outward
  const dist = p0.distanceTo(p1);
  mid.z += dist * 0.3;

  const curve = new THREE.QuadraticBezierCurve3(p0,mid,p1);
  const tubeGeom = new THREE.TubeGeometry(curve,40,0.03 + e.strength*0.18,6,false);
  const tubeMat = new THREE.MeshBasicMaterial({
    color:new THREE.Color().lerpColors(
      new THREE.Color(from.color),new THREE.Color(to.color),0.5
    ),
    transparent:true,
    opacity:0.25 + e.strength*0.55,
    blending:THREE.AdditiveBlending,
    depthWrite:false
  });
  const tube = new THREE.Mesh(tubeGeom,tubeMat);
  scene.add(tube);
});

// Lighting
scene.add(new THREE.AmbientLight(0x111122,0.5));
const pointLight = new THREE.PointLight(0xffffff,2,40);
pointLight.position.set(0,0,0);
scene.add(pointLight);

// Legend
const legDiv = document.getElementById('legend');
nodeData.forEach(nd => {
  const d = document.createElement('div');
  d.className = 'leg';
  d.innerHTML = `<div class="dot" style="background:${nd.color};box-shadow:0 0 6px ${nd.color}"></div>${nd.id}`;
  legDiv.appendChild(d);
});

// Animate
let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.005;
  controls.update();
  // subtle node breathing
  nodeMeshes.forEach((m,i) => {
    const s = 1 + Math.sin(time*2 + i)*0.06;
    m.scale.setScalar(s);
  });
  composer.render();
  labelRenderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
  composer.setSize(window.innerWidth,window.innerHeight);
  labelRenderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
